<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — Muñoz Burger</title>
  <meta name="theme-color" content="#B31942">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      background: #0A3161;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .container { max-width: 480px; width: 100%; }

    h1 {
      font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
      font-size: clamp(3rem, 12vw, 5rem);
      letter-spacing: .04em;
      line-height: 1;
      margin-bottom: .5rem;
      color: #fff;
    }

    .brand {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .3em;
      color: rgba(255,255,255,.5);
      margin-bottom: 2rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255,255,255,.75);
      margin-bottom: 2rem;
    }

    .btn-group { display: flex; flex-direction: column; gap: .75rem; align-items: center; }

    button {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      letter-spacing: .1em;
      font-size: 1.1rem;
      padding: 14px 32px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      min-width: 220px;
      transition: transform .1s, box-shadow .1s;
    }

    .btn-primary { background: #B31942; color: #fff; border-color: #B31942; box-shadow: 4px 4px 0 rgba(0,0,0,.3); }
    .btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(0,0,0,.3); }

    .btn-ghost { background: transparent; color: rgba(255,255,255,.7); border-color: rgba(255,255,255,.3); }
    .btn-ghost:hover { border-color: rgba(255,255,255,.6); color: #fff; }

    .status {
      margin-top: 2rem;
      font-size: .85rem;
      color: rgba(255,255,255,.4);
      letter-spacing: .05em;
    }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      margin-right: 6px;
      vertical-align: middle;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <div class="container">
    <h1>SIN CONEXIÓN</h1>
    <div class="brand">MUÑOZ BURGER · NOGALES, SONORA</div>
    <p>No hay red disponible. Regresa cuando tengas conexión y te atendemos de inmediato.</p>

    <div class="btn-group">
      <button class="btn-primary" onclick="window.location.reload()">INTENTAR DE NUEVO</button>
      <button class="btn-ghost" onclick="history.length>1?history.back():location.href='/'">VOLVER</button>
    </div>

    <div class="status" id="status">
      <span class="dot"></span> MODO OFFLINE ACTIVO
    </div>
  </div>

  <script>
    window.addEventListener('online', () => {
      document.getElementById('status').innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#059669;margin-right:6px;vertical-align:middle;"></span> CONEXIÓN RESTAURADA';
      setTimeout(() => location.reload(), 800);
    });
  </script>
</body>
</html>
